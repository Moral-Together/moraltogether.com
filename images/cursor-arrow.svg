        stroke-linejoin="miter" stroke-linecap="square"/>
  <!-- white fill on top -->
  <path d="M 3,2 L 3,21 L 8,16 L 11,24 L 14,22 L 11,14 L 18,7 Z"
        fill="white" stroke="white" stroke-width="0.6"
        filter="url(#s)"/>
</svg>
