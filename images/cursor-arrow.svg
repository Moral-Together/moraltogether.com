<svg xmlns="http://www.w3.org/2000/svg" width="26" height="30" viewBox="0 0 26 30">
  <defs>
    <filter id="s" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
  </defs>
  <!-- outer dark stroke for visibility on light backgrounds -->
  <path d="M 3,2 L 3,21 L 8,16 L 11,24 L 14,22 L 11,14 L 18,7 Z"
